[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    gui: GUI component tests
    export: Export functionality tests
    negation: Negation detection tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Timeout for tests (in seconds)
timeout = 300

# Ignore paths
norecursedirs = 
    .git
    .tox
    .venv
    venv
    dist
    build
    *.egg
    __pycache__
    .pytest_cache
    data
    results
    docs

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::FutureWarning

# Asyncio mode
asyncio_mode = auto
